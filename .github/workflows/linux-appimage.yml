name: Linux Desktop AppImage

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  appimage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build uber JAR
        run: ./gradlew :composeApp:packageReleaseUberJarForCurrentOS --refresh-dependencies

      - name: Create minimal JRE with jlink
        run: |
          JAR_FILE=$(ls composeApp/build/compose/jars/*.jar | head -1)
          echo "JAR: $JAR_FILE"

          MODULES=$("$JAVA_HOME/bin/jdeps" \
            --multi-release 21 \
            --ignore-missing-deps \
            --print-module-deps \
            "$JAR_FILE" 2>/dev/null)
          echo "Required modules: $MODULES"

          "$JAVA_HOME/bin/jlink" \
            --add-modules "$MODULES" \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=zip-6 \
            --output AppDir/usr/lib/jvm

      - name: Package AppImage
        run: |
          APP_NAME="LRC_Studio"

          JAR_FILE=$(ls composeApp/build/compose/jars/*.jar | head -1)
          mkdir -p AppDir/usr/bin
          cp "$JAR_FILE" AppDir/usr/bin/"$APP_NAME.jar"

          cp composeApp/src/jvmMain/resources/icon.png AppDir/"$APP_NAME.png"

          cat > AppDir/"$APP_NAME.desktop" <<EOF
          [Desktop Entry]
          Name=LRC Studio
          Exec=$APP_NAME
          Icon=$APP_NAME
          Type=Application
          Categories=AudioVideo;Audio;Video;
          Terminal=false
          EOF

          cat > AppDir/AppRun <<'SCRIPT'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "$APPDIR/usr/lib/jvm/bin/java" -jar "$APPDIR/usr/bin/LRC_Studio.jar" "$@"
          SCRIPT
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract > /dev/null 2>&1

          ./squashfs-root/AppRun AppDir "$APP_NAME-x86_64.AppImage"

      - name: Analyze size breakdown
        run: |
          echo "═══════════════════════════════════════"
          echo "         SIZE BREAKDOWN"
          echo "═══════════════════════════════════════"

          JAR_FILE=$(ls composeApp/build/compose/jars/*.jar 2>/dev/null | head -1)
          JAR_SIZE=$(du -h "$JAR_FILE" 2>/dev/null | cut -f1)
          echo "• Uber JAR:           $JAR_SIZE  ($JAR_FILE)"

          JRE_SIZE=$(du -sh AppDir/usr/lib/jvm 2>/dev/null | cut -f1)
          echo "• jlink JRE:          $JRE_SIZE  (AppDir/usr/lib/jvm)"

          echo ""
          echo "  ── JRE modules breakdown ──"
          du -sh AppDir/usr/lib/jvm/lib/modules 2>/dev/null | awk '{printf "  • modules:     %s\n", $1}'
          du -sh AppDir/usr/lib/jvm/lib/ 2>/dev/null | awk '{printf "  • lib/:        %s\n", $1}'
          du -sh AppDir/usr/lib/jvm/bin/ 2>/dev/null | awk '{printf "  • bin/:        %s\n", $1}'

          echo ""
          echo "  ── AppDir breakdown ──"
          du -sh AppDir/usr/bin/ 2>/dev/null | awk '{printf "  • usr/bin/:    %s (JAR)\n", $1}'
          du -sh AppDir/usr/lib/ 2>/dev/null | awk '{printf "  • usr/lib/:    %s (JRE)\n", $1}'

          APPIMAGE_SIZE=$(du -h *.AppImage 2>/dev/null | cut -f1)
          echo ""
          echo "• AppImage total:     $APPIMAGE_SIZE"
          echo "═══════════════════════════════════════"

      - name: Verify AppImage dependencies
        run: |
          APPIMAGE=$(ls *.AppImage | head -1)
          echo "Extracting $APPIMAGE ..."
          ./"$APPIMAGE" --appimage-extract > /dev/null 2>&1
          echo "=== Checking linked libraries ==="
          ldd squashfs-root/usr/lib/jvm/bin/java | grep "not found" && {
            echo "FAIL: Some libraries are missing!"
            exit 1
          } || echo "All libraries resolved ✓"
          rm -rf squashfs-root

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: lrc-studio-appimage
          path: "*.AppImage"
          compression-level: 0

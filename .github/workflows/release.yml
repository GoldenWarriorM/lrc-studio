name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    environment: lrc-studio

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build unsigned Android release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Find apksigner
        id: find-apksigner
        run: echo "path=$(ls $ANDROID_HOME/build-tools/*/apksigner | head -1)" >> $GITHUB_OUTPUT

      - name: Validate signing secrets
        run: |
          if [[ -z "${{ secrets.KEY_ALIAS }}" ]]; then
            echo "::error::KEY_ALIAS secret is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]]; then
            echo "::error::KEYSTORE_PASSWORD secret is not set"
            exit 1
          fi

      - name: Sign APK with apksigner
        run: |
          set -x
          SIGN_ARGS=(
            --ks ${{ runner.temp }}/release.keystore
            --ks-key-alias ${{ secrets.KEY_ALIAS }}
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }}
          )
          if [[ -n "${{ secrets.KEY_PASSWORD }}" ]]; then
            SIGN_ARGS+=(--key-pass pass:${{ secrets.KEY_PASSWORD }})
          fi
          APK_FILE=$(ls composeApp/build/outputs/apk/release/*.apk | head -1)
          ${{ steps.find-apksigner.outputs.path }} sign \
            "${SIGN_ARGS[@]}" \
            "$APK_FILE"

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd composeApp/build/outputs/apk/release
          for f in *.apk; do
            mv "$f" "LRC_Studio-$VERSION.apk"
          done

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/outputs/apk/release/LRC_Studio-*.apk

  linux-x86-64:
    name: Linux x86_64 AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build uber JAR
        run: ./gradlew :composeApp:packageReleaseUberJarForCurrentOS

      - name: Create JRE and package AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="LRC_Studio"

          JAR_FILE=$(ls composeApp/build/compose/jars/*.jar | head -1)

          MODULES=$("$JAVA_HOME/bin/jdeps" \
            --multi-release 21 \
            --ignore-missing-deps \
            --print-module-deps \
            "$JAR_FILE" 2>/dev/null)

          mkdir -p AppDir/usr/bin

          "$JAVA_HOME/bin/jlink" \
            --add-modules "$MODULES" \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=zip-6 \
            --output AppDir/usr/lib/jvm

          cp "$JAR_FILE" AppDir/usr/bin/"$APP_NAME.jar"
          cp composeApp/src/jvmMain/resources/icon.png AppDir/"$APP_NAME.png"

          cat > AppDir/"$APP_NAME.desktop" <<EOF
          [Desktop Entry]
          Name=LRC Studio
          Exec=$APP_NAME
          Icon=$APP_NAME
          Type=Application
          Categories=AudioVideo;Audio;Video;
          Terminal=false
          EOF

          cat > AppDir/AppRun <<'SCRIPT'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "$APPDIR/usr/lib/jvm/bin/java" -jar "$APPDIR/usr/bin/LRC_Studio.jar" "$@"
          SCRIPT
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract > /dev/null 2>&1
          ./squashfs-root/AppRun AppDir "$APP_NAME-$VERSION-x86_64.AppImage"

      - name: Verify dependencies
        run: |
          APPIMAGE=$(ls *.AppImage | head -1)
          ./"$APPIMAGE" --appimage-extract > /dev/null 2>&1
          ldd squashfs-root/usr/lib/jvm/bin/java | grep "not found" && {
            echo "FAIL: Missing libraries!"
            exit 1
          } || echo "All libraries resolved ✓"
          rm -rf squashfs-root

      - name: Upload AppImage to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*x86_64.AppImage"


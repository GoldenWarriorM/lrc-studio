name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build unsigned Android release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Find apksigner
        id: find-apksigner
        run: echo "path=$(ls $ANDROID_HOME/build-tools/*/apksigner | head -1)" >> $GITHUB_OUTPUT

      - name: Sign APK with apksigner
        run: |
          ${{ steps.find-apksigner.outputs.path }} sign \
            --ks ${{ runner.temp }}/release.keystore \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            composeApp/build/outputs/apk/release/*.apk

      - name: Build Desktop distribution
        run: ./gradlew :composeApp:packageDistributionForCurrentOS

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: composeApp/build/outputs/apk/release/*.apk

      - name: Upload Desktop distribution
        uses: actions/upload-artifact@v4
        with:
          name: linux-distribution
          path: composeApp/build/compose/binaries/main/
